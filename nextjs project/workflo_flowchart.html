
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-Dienstverlener Tevredenheidscheck - Workflo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .question-container {
            padding: 50px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: #333;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #333;
        }

        .option-btn:hover {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2);
        }

        .positive-btn:hover {
            background: #e8f5e8;
            border-color: #4caf50;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
        }

        .negative-btn:hover {
            background: #ffebee;
            border-color: #f44336;
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.2);
        }

        .result {
            text-align: center;
            padding: 40px;
        }

        .result.satisfied {
            background: linear-gradient(135deg, #4caf50, #8bc34a);
            color: white;
        }

        .result.contact {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .result h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .result p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .contact-info {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .contact-info h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .contact-info p {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .restart-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        .progress-bar {
            background: #e9ecef;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .question-number {
            color: #666;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .question-container {
                padding: 30px 20px;
            }

            .question {
                font-size: 1.3rem;
            }

            .options {
                gap: 15px;
            }

            .option-btn {
                padding: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 IT-Dienstverlener Check</h1>
            <p>Ontdek in 2 minuten of jouw IT-partner écht voor je zorgt</p>
        </div>

        <div id="questionContainer" class="question-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <div id="questionNumber" class="question-number">Vraag 1 van 26</div>
            <div id="question" class="question">Laden...</div>
            <div id="options" class="options">
                <!-- Options will be populated by JavaScript -->
            </div>
        </div>

        <div id="resultContainer" class="result" style="display: none;">
            <!-- Results will be populated by JavaScript -->
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                question: "Zijn jullie tevreden met de technische ondersteuning die jullie ontvangen?",
                options: ["Ja, dat zijn wij", "Nee, dat zijn we niet"],
                next: [2, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 2,
                question: "Reageert de ICT-dienstverlener binnen de afgesproken tijd op uw verzoeken?",
                options: ["Ja, dat doen ze", "Niet altijd"],
                next: [3, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 3,
                question: "Worden jullie problemen binnen de afgesproken termijn opgelost?",
                options: ["Meestal wel", "Niet altijd"],
                next: [4, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 4,
                question: "Communiceert de ICT-dienstverlener duidelijk over de status van jullie verzoeken?",
                options: ["Ja, over het algemeen wel", "Soms niet echt"],
                next: [5, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 5,
                question: "Zijn de oplossingen van de ICT-dienstverlener effectief?",
                options: ["Jazeker", "Nee, soms niet"],
                next: [6, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 6,
                question: "Voldoen de technici van de ICT-dienstverlener aan uw verwachtingen qua kennis en vaardigheden?",
                options: ["Over het algemeen wel", "Nee, soms niet"],
                next: [7, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 7,
                question: "Worden jullie ICT-problemen meestal in één keer opgelost?",
                options: ["Absoluut", "Niet altijd"],
                next: [8, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 8,
                question: "Vinden jullie de ICT-dienstverlener klantgericht?",
                options: ["Wij vinden van wel", "Niet altijd of tegen iedereen"],
                next: [9, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 9,
                question: "Zijn de kosten van de diensten van de ICT-dienstverlener redelijk?",
                options: ["Ja hoor", "Ze schieten de pan uit"],
                next: [10, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 10,
                question: "Begrijpt de ICT-dienstverlener jullie bedrijfsbehoeften?",
                options: ["Ze snappen er soms niks van", "Wij vinden van wel"],
                next: ["contact", 11],
                type: ["negative", "positive"]
            },
            {
                id: 11,
                question: "Ervaren jullie vaak herhalende problemen met jullie ICT-systemen?",
                options: ["Regelmatig", "Wel eens"],
                next: ["contact", 12],
                type: ["negative", "positive"]
            },
            {
                id: 12,
                question: "Biedt de ICT-dienstverlener proactieve aanbevelingen voor systeemverbeteringen?",
                options: ["Nee, dat doen ze niet", "Ja, dat doen ze"],
                next: ["contact", 13],
                type: ["negative", "positive"]
            },
            {
                id: 13,
                question: "Is de ICT-dienstverlener beschikbaar buiten normale werktijden als dat nodig is?",
                options: ["Wij krijgen ze nooit te pakken", "Altijd"],
                next: ["contact", 14],
                type: ["negative", "positive"]
            },
            {
                id: 14,
                question: "Voelen jullie dat jullie gegevens veilig zijn bij de ICT-dienstverlener?",
                options: ["Ja, heel veilig", "Daar twijvelen we weleens aan"],
                next: [15, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 15,
                question: "Hebben jullie vertrouwen in de ICT-dienstverlener om kritieke problemen aan te pakken?",
                options: ["Volle vertrouwen", "Soms twijvelen we daaraan"],
                next: [16, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 16,
                question: "Zijn de facturen van de ICT-dienstverlener duidelijk en transparant?",
                options: ["We klagen niet", "We snappen er soms niks van"],
                next: [17, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 17,
                question: "Past de ICT-dienstverlener zich goed aan veranderende eisen aan?",
                options: ["Heel goed zelfs", "Helemaal niet"],
                next: [18, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 18,
                question: "Zouden jullie de ICT-dienstverlener aanbevelen aan andere bedrijven?",
                options: ["100% Zeker", "We kunnen niemand anders"],
                next: [19, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 19,
                question: "Krijgen jullie regelmatig updates over lopende werkzaamheden?",
                options: ["Meer dan genoeg", "We krijgen nooit updates"],
                next: [20, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 20,
                question: "Is de ICT-dienstverlener in staat om complexe problemen op te lossen?",
                options: ["Ze zijn de beste", "Ze snappen het soms zelf ook niet"],
                next: [21, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 21,
                question: "Is de documentatie die de ICT-dienstverlener levert duidelijk en bruikbaar?",
                options: ["Heel duidelijk", "Documentatie?"],
                next: [22, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 22,
                question: "Is de ICT-dienstverlener proactief in het identificeren van potentiële problemen?",
                options: ["Ja, dat doen ze heel goed", "Nee, altijd achteraf"],
                next: [23, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 23,
                question: "Krijgen jullie regelmatig rapporten over de prestaties van jullie ICT-systemen?",
                options: ["Ja, hele goede", "Valt dat te meten?"],
                next: [24, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 24,
                question: "Is de ICT-dienstverlener transparant over de kosten van extra diensten?",
                options: ["Heel transparant", "Nee. Het zit allemaal in pakketten"],
                next: [25, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 25,
                question: "Voelen jullie je gewaardeerd als klant door de ICT-dienstverlener?",
                options: ["Ja. Heel erg!", "Feedback?"],
                next: [26, "contact"],
                type: ["positive", "negative"]
            },
            {
                id: 26,
                question: "Voelen jullie dat de ICT-dienstverlener jullie feedback serieus neemt?",
                options: ["Jazeker, dat doen ze heel goed", "Feedback?"],
                next: ["satisfied", "contact"],
                type: ["positive", "negative"]
            }
        ];

        let currentQuestion = 0;
        let totalQuestions = questions.length;

        function showQuestion(questionIndex) {
            const question = questions[questionIndex];
            const questionContainer = document.getElementById('questionContainer');
            const questionNumber = document.getElementById('questionNumber');
            const questionText = document.getElementById('question');
            const optionsContainer = document.getElementById('options');
            const progressFill = document.getElementById('progressFill');

            // Update progress
            const progress = ((questionIndex + 1) / totalQuestions) * 100;
            progressFill.style.width = progress + '%';

            // Update question number
            questionNumber.textContent = `Vraag ${questionIndex + 1} van ${totalQuestions}`;

            // Update question text
            questionText.textContent = question.question;

            // Clear and populate options
            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = `option-btn ${question.type[index]}-btn`;
                button.textContent = option;
                button.onclick = () => handleAnswer(questionIndex, index);
                optionsContainer.appendChild(button);
            });

            // Show question container
            questionContainer.style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
        }

        function handleAnswer(questionIndex, optionIndex) {
            const question = questions[questionIndex];
            const nextStep = question.next[optionIndex];

            if (nextStep === 'contact') {
                showResult('contact');
            } else if (nextStep === 'satisfied') {
                showResult('satisfied');
            } else {
                // Continue to next question
                currentQuestion = nextStep - 1; // Convert to 0-based index
                showQuestion(currentQuestion);
            }
        }

        function showResult(resultType) {
            const questionContainer = document.getElementById('questionContainer');
            const resultContainer = document.getElementById('resultContainer');

            questionContainer.style.display = 'none';
            resultContainer.style.display = 'block';

            if (resultType === 'satisfied') {
                resultContainer.className = 'result satisfied';
                resultContainer.innerHTML = `
                    <h2>🎉 Helemaal goed geregeld!</h2>
                    <p>Fantastisch! Het lijkt erop dat jullie IT-dienstverlener uitstekend werk levert. Jullie zijn goed verzorgd en kunnen met vertrouwen verder!</p>
                    <p>Blijf jullie huidige IT-partner trouw - dit is precies hoe IT-ondersteuning hoort te zijn.</p>
                    <button class="restart-btn" onclick="restartQuiz()">Opnieuw beginnen</button>
                `;
            } else {
                resultContainer.className = 'result contact';
                resultContainer.innerHTML = `
                    <h2>🤝 Tijd voor een gesprek!</h2>
                    <p>Op basis van jouw antwoorden lijkt het erop dat er ruimte is voor verbetering in jullie IT-ondersteuning. Wij kunnen helpen!</p>
                    <div class="contact-info">
                        <h3>Neem contact met ons op:</h3>
                        <p><strong>📞 Telefoon:</strong> 020-30 80 465</p>
                        <p><strong>📧 E-mail:</strong> info@workflo.nl</p>
                        <p><strong>🌐 Website:</strong> workflo.it</p>
                        <p><strong>📍 Adres:</strong> Amsterdam</p>
                    </div>
                    <p style="margin-top: 20px; font-size: 1rem;">Wij bieden een gratis IT-scan aan om te kijken hoe we jullie kunnen helpen!</p>
                    <button class="restart-btn" onclick="restartQuiz()">Opnieuw beginnen</button>
                `;
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            showQuestion(currentQuestion);
        }

        // Initialize the quiz
        document.addEventListener('DOMContentLoaded', function() {
            showQuestion(currentQuestion);
        });
    </script>
</body>
</html>
